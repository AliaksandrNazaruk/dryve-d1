[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cia402"
dynamic = ["version"]
description = "Generic async CiA 402 (CANopen Drive Profile) driver framework for Python"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
authors = [{name = "Aliaksandr Nazaruk"}]
keywords = ["cia402", "canopen", "modbus-tcp", "motor-control", "servo", "stepper", "drive"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Intended Audience :: Manufacturing",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Hardware :: Hardware Drivers",
    "Topic :: Scientific/Engineering",
    "Typing :: Typed",
]
dependencies = ["pydantic>=2.0,<3"]

[project.urls]
Repository = "https://github.com/AliaksandrNazaruk/dryve-d1"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "hypothesis>=6.0",
    "ruff>=0.15",
    "mypy>=1.19",
]

[tool.hatch.version]
path = "src/cia402/version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/cia402"]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
ignore = ["E402"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true

# API layer uses mixin pattern with cross-mixin attribute access
[[tool.mypy.overrides]]
module = "cia402.api.*"
disable_error_code = ["empty-body", "attr-defined", "no-any-return", "arg-type"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
