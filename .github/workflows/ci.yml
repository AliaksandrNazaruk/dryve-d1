name: ci

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src/ tests/

      - name: Mypy
        run: mypy src/dryve_d1

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit -m "not simulator" -q

      - name: Run property tests
        run: pytest tests/property -q

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install bandit pip-audit
          pip install -e .

      - name: Bandit
        run: bandit -r src/dryve_d1 -ll

      - name: pip-audit
        run: python -m pip_audit
